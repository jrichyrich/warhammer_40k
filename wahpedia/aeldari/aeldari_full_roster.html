<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aeldari Full Codex & Roster - Print Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;800;900&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --ink-black: #1a1a1a;
            --ink-grey: #f0f0f0;
            --ink-border: #333;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto Condensed', sans-serif;
            background-color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            color: var(--ink-black);
        }
        
        .section-title {
            width: 1000px;
            text-align: center;
            font-family: 'Exo 2', sans-serif;
            font-size: 48px;
            font-weight: 900;
            text-transform: uppercase;
            border-bottom: 4px solid var(--ink-black);
            padding-bottom: 10px;
            margin-top: 40px;
            page-break-before: always;
        }

        /* Rule Cards (Markdown) */
        .rule-card {
            width: 1000px;
            background-color: white;
            padding: 30px;
            line-height: 1.6;
            font-size: 16px;
            page-break-inside: avoid;
            margin-bottom: 20px;
        }
        
        .rule-card h1, .rule-card h2, .rule-card h3 {
            font-family: 'Exo 2', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            margin-top: 0;
            border-bottom: 2px solid var(--ink-black);
            padding-bottom: 5px;
        }
        .rule-card table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .rule-card th, .rule-card td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }
        .rule-card th { background: var(--ink-grey); font-weight: bold; }

        /* Datasheet Cards */
        .datasheet {
            width: 1000px;
            background-color: white;
            border: 1.5px solid var(--ink-black);
            position: relative;
            page-break-inside: avoid;
        }
        .header {
            border-bottom: 2px solid var(--ink-black);
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 65px;
        }
        .header h1 {
            margin: 0;
            font-family: 'Exo 2', sans-serif;
            font-size: 30px;
            text-transform: uppercase;
            font-weight: 900;
        }
        .stats-container {
            display: flex;
            padding: 10px 25px;
            gap: 12px;
        }
        .stat-box {
            border: 1.5px solid var(--ink-black);
            clip-path: polygon(8px 0%, calc(100% - 8px) 0%, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0% calc(100% - 8px), 0% 8px);
            width: 70px;
            text-align: center;
            padding: 5px 0;
        }
        .stat-label { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; }
        .stat-val { font-family: 'Exo 2', sans-serif; font-size: 24px; font-weight: 900; }
        .invuln-badge {
            margin-left: 25px;
            margin-bottom: 12px;
            border: 1.5px solid var(--ink-black);
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            font-weight: 800;
            font-size: 12px;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
        }
        .invuln-val { font-size: 18px; font-weight: 900; margin-right: 8px; border-right: 1px solid #ccc; padding-right: 8px; }
        .main-grid {
            display: grid;
            grid-template-columns: 1.7fr 1.3fr;
            border-top: 1.5px solid var(--ink-black);
        }
        .left-col { border-right: 1.5px solid var(--ink-black); }
        .section-header {
            background-color: var(--ink-grey);
            padding: 5px 20px;
            text-transform: uppercase;
            font-weight: 800;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--ink-black);
        }
        .weapon-labels { display: flex; gap: 20px; font-size: 9px; font-weight: 700; padding-right: 5px; opacity: 0.7; }
        .weapon-labels span { width: 35px; text-align: center; }
        .weapon-row {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid #ddd;
        }
        .weapon-info b { font-size: 16px; display: block; }
        .tag {
            border: 1px solid #aaa;
            padding: 1px 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            margin-right: 4px;
            display: inline-block;
            margin-bottom: 2px;
        }
        .weapon-stats {
            display: flex;
            gap: 20px;
            font-family: 'Exo 2', sans-serif;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
        }
        .weapon-stats span { width: 35px; }
        .ability-content { padding: 15px 20px; font-size: 13px; line-height: 1.4; }
        .ability-item { margin-bottom: 8px; }
        .ability-header { font-weight: 900; text-transform: uppercase; }
        .composition-box { padding: 15px 20px; position: relative; min-height: 80px; font-size: 13px; }
        .points-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            border: 2px solid var(--ink-black);
            padding: 5px 12px;
            font-weight: 900;
            font-size: 20px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        .footer {
            padding: 8px 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            font-size: 11px;
            border-top: 1.5px solid var(--ink-black);
            background: #fafafa;
        }
        .footer b { text-transform: uppercase; font-weight: 800; }
        .footer-divider { border-left: 1px solid #ddd; padding-left: 15px; }

        @media print {
            body { padding: 0; gap: 20px; }
            .datasheet, .rule-card { width: 100%; }
            .section-title { width: 100%; border-bottom: 2px solid var(--ink-black); }
        }
    </style>
</head>

<script>
    const rulesData = [{"filename": "amallyn_shadowguide.md", "content": "# Amallyn Shadowguide\n\n**M:** 7\" | **T:** 3 | **Sv:** 5+ | **W:** 3 | **Ld:** 6+ | **OC:** 1\n\n### Invulnerable Save: 4+\n\n### Ranged Weapons\n| Weapon | Range | A | BS | S | AP | D | Keywords |\n| :--- | :---: | :---: | :---: | :---: | :---: | :---: | :---: |\n| Ranger long rifle | 36\" | 1 | 3+ | 4 | -1 | 2 | Heavy, Precision |\n\n### Melee Weapons\n| Weapon | Range | A | WS | S | AP | D | Keywords |\n| :--- | :---: | :---: | :---: | :---: | :---: | :---: | :---: |\n| Power blade | Melee | 4 | 3+ | 4 | -2 | 1 | - |\n\n### Abilities\n**Core:** Infiltrators, Lone Operative, Stealth\n**Faction:** Battle Focus\n\n**The Path Least Travelled:** If your army includes this model, after both players have deployed their armies and determined who has the first turn, you can select one **RANGERS** or **SHROUD RUNNERS** unit from your army and redeploy that unit. When doing so, that unit can be placed into Strategic Reserves, regardless of how many units are already in Strategic Reserves.\n\n**Path of the Outcast:** Once per turn, when an enemy unit ends a Normal, Advance or Fall Back move within 9\" of this model, if this model is not within Engagement Range of one or more enemy units, it can make a Normal move of up to D6\".\n\n### Unit Composition\n* 1 Amallyn Shadowguide \u2013 **EPIC HERO**\n* This model is equipped with: ranger long rifle; power blade.\n\n### Keywords\n**Keywords:** Infantry, Character, Grenades, Epic Hero, Aeldari, Amallyn Shadowguide\n**Faction Keywords:** Asuryani\n\n**Points:** 75\n"}, {"filename": "army_rules.md", "content": "# Aeldari Army Rules\n\n## Battle Focus\nIn war, as in all things, the Aeldari bring the full might of their intellect, skill and agility to bear upon the task. Coupled with their exceptional technology, this ensures they move with swiftness and grace that is impossible for the foe to match.\n\nIf your Army Faction is **ASURYANI**, at the start of the battle round, you receive a number of Battle Focus tokens based on the battle size, as shown in the table below:\n\n| Battle Size | Battle Focus Tokens |\n| :--- | :--- |\n| Incursion | 2 |\n| Strike Force | 4 |\n| Onslaught | 6 |\n\nEach time one of the triggers shown in the **Agile Manoeuvres** section below occurs, you can spend one Battle Focus token to enable the relevant eligible unit to perform that Agile Manoeuvre. A unit is eligible to perform an Agile Manoeuvre if it has this ability and has not already performed an Agile Manoeuvre in the same phase. Unless otherwise stated, you cannot trigger the same Agile Manoeuvre more than once per phase. At the end of the battle round, all unspent Battle Focus tokens are lost.\n\n### Agile Manoeuvres\n\n#### Swift as the Wind\n*   **Trigger:** When an eligible unit from your army is selected to make a Normal, Advance or Fall Back move. You can trigger this Agile Manoeuvre more than once per phase (provided a different unit performs it each time).\n*   **Effect:** Until the end of the phase, add 2\" to the Move characteristic of models in that unit.\n\n#### Flitting Shadows\n*   **Trigger:** When an eligible unit from your army is selected to make a Normal, Advance or Fall Back move, is set up on the battlefield, or declares a charge.\n*   **Effect:** Until the end of the turn, enemy units cannot use the Fire Overwatch Stratagem to shoot at that unit.\n\n#### Star Engines\n*   **Trigger:** When an eligible **VEHICLE** unit from your army is selected to make an Advance move.\n*   **Effect:** Until the end of the turn, Ranged weapons equipped by this unit have the **[ASSAULT]** ability.\n\n#### Sudden Strike\n*   **Trigger:** When an eligible unit from your army is selected to fight.\n*   **Effect:** Until the end of the phase, each time a model in that unit makes a Pile-in or Consolidation move, it can move up to 6\" instead of up to 3\".\n\n#### Opportunity Seized\n*   **Trigger:** When an enemy unit ends a Fall Back move.\n*   **Effect:** One eligible unit from your army (excluding **TITANIC** units) that started the phase within Engagement Range of that enemy unit can make a Normal move of up to D6+1\".\n\n#### Fade Back\n*   **Trigger:** In your opponent\u2019s Shooting phase, just after an enemy unit has shot.\n*   **Effect:** One eligible unit from your army (excluding **TITANIC** units) that was hit by one or more of those attacks can make a Normal move of up to D6+1\".\n\n---\n\n## Strands of Fate\nThe Aeldari live on the brink of extinction. As such, their Farseers have become adept at reading future events, seeing the many strands of fate ahead of their people and the consequences of following each one. Taken at the right time, a simple action can avoid calamitous outcomes, aiding the Aeldari in their continued struggle for survival.\n\nIf your Army Faction is **AELDARI**, at the start of the battle, make a Strands of Fate roll by rolling six D6.\n\nIf you wish, you can then re-roll all of these dice, but if you do, roll one less D6. You can continue re-rolling all of the dice in this manner, rolling one less D6 each time you do, until you are satisfied with the results rolled (or until you only have a single D6 remaining).\n\nWhen you are satisfied with the results rolled, those remaining dice become your Fate dice for the battle. These results cannot be changed or re-rolled further, unless a rule specifically states otherwise. Keep your Fate dice to one side \u2013 this is your Fate dice pool.\n\nOnce per phase, before making a dice roll for a model or unit from your army with the Strands of Fate ability, if you have one or more dice in your Fate dice pool, you can use one of those Fate dice. To do so, select one of those Fate dice to substitute that dice roll. The dice that is being substituted is not rolled; instead, the value of the selected Fate dice is used as if it had been rolled (this counts as an unmodified dice roll of that value for all rules purposes). Each Fate dice can only be used in this way once. After using a Fate dice, remove it from your Fate dice pool and roll all remaining dice that are part of that dice roll (if any). \n\nYou can use Fate dice for any of the following types of dice roll:\n*   Advance roll\n*   Battle-shock test\n*   Charge roll\n*   Damage roll\n*   Hit roll\n*   Saving throw\n*   Wound roll\n\n---\n\n## Disparate Paths\nWhen mustering your army, you can include **HARLEQUINS** units in your army, even though they do not have the **ASURYANI** Faction keyword. Unless otherwise stated, you cannot select **HARLEQUINS** or **YNNARI** as your Army Faction."}, {"filename": "boarding_actions.md", "content": "# Aeldari Boarding Actions\n\nThe following Boarding Action detachments are available:\n\n1.  **Khaine\u2019s Arrow** (Unerring Strike rule)\n2.  **Protector Host** (Determined Defence rule)\n3.  **Wraiths of the Void** (Wraith-Marked rule)\n4.  **Star-dancer Masque** (Faolch\u00fa\u2019s Last Flight rule)\n"}, {"filename": "cobra.md", "content": "### **COBRA**\n**M:** 14\" | **T:** 11 | **SV:** 2+ | **W:** 24 | **LD:** 6+ | **OC:** 8\n**Invulnerable Save:** 5+\n\n| Ranged Weapons | Range | A | BS | S | AP | D | Keywords |\n| :--- | :---: | :---: | :---: | :---: | :---: | :---: | :--- |\n| Aeldari missile launcher \u2013 starshot | 48\" | 1 | 3+ | 10 | -2 | D6 | - |\n| Aeldari missile launcher \u2013 sunburst blast | 48\" | D6 | 3+ | 4 | -1 | 1 | Blast |\n| Bright lance | 36\" | 1 | 3+ | 12 | -3 | D6+2 | - |\n| **D-impaler** | 36\" | D6+3 | 3+ | 16 | -4 | 4 | Blast, Devastating Wounds |\n| Scatter laser | 36\" | 6 | 3+ | 5 | 0 | 1 | - |\n| Shuriken cannon | 24\" | 3 | 3+ | 6 | -1 | 2 | Sustained Hits 1 |\n| Starcannon | 36\" | 2 | 3+ | 8 | -3 | 2 | - |\n\n| Melee Weapons | Range | A | WS | S | AP | D | Keywords |\n| :--- | :---: | :---: | :---: | :---: | :---: | :---: | :--- |\n| Wraithbone hull | Melee | 6 | 4+ | 6 | 0 | 1 | - |\n\n**Abilities**\n*   **Core:** Deadly Demise D6+2\n*   **Faction:** Battle Focus\n*   **D-rift:** In your Shooting phase, just after selecting a target for this model's D-impaler, roll one D6 for the target unit and every other unit within 3\" of that unit: on a 5+, the unit being rolled for is struck by a D-rift. After this model has finished making its attacks against that target unit this phase, each unit struck by a D-rift this phase suffers D3 mortal wounds.\n\n**Damaged: 1-8 Wounds Remaining**\nWhile this model has 1-8 wounds remaining, subtract 4 from its Objective Control characteristic and each time this model makes an attack, subtract 1 from the Hit roll.\n\n**Wargear Options**\n*   This model's shuriken cannon can be replaced with one of the following: 1 Aeldari missile launcher, 1 bright lance, 1 scatter laser, or 1 starcannon.\n\n**Unit Composition**\n*   1 Cobra (Equipped with: D-impaler, shuriken cannon, wraithbone hull)\n\n**Keywords:** Vehicle, Titanic, Fly, Aeldari, Cobra\n**Faction Keywords:** Asuryani"}, {"filename": "corsair_voidscarred.md", "content": "# Corsair Voidscarred\n\n**M:** 7\" | **T:** 3 | **Sv:** 4+ | **W:** 1 | **Ld:** 7+ | **OC:** 1\n\n### Ranged Weapons\n| Weapon | Range | A | BS | S | AP | D | Keywords |\n| :--- | :---: | :---: | :---: | :---: | :---: | :---: | :--- |\n| Blaster | 18\" | 1 | 3+ | 8 | -4 | D6+1 | Assault |\n| Executioner | 18\" | 3 | 3+ | 6 | -2 | D3 | Anti-Infantry 2+, Psychic |\n| Fusion pistol | 6\" | 1 | 3+ | 8 | -4 | D6 | Assault, Melta 2, Pistol |\n| Long rifle | 36\" | 1 | 3+ | 4 | -1 | 2 | Heavy, Precision |\n| Neuro disruptor | 12\" | 1 | 3+ | 4 | -2 | 1 | Anti-Infantry 2+, Assault, Pistol |\n| Shredder | 18\" | D6 | N/A | 6 | 0 | 1 | Assault, Torrent |\n| Shuriken cannon | 24\" | 3 | 3+ | 6 | -1 | 2 | Lethal Hits |\n| Shuriken pistol | 12\" | 1 | 3+ | 4 | -1 | 1 | Assault, Pistol |\n| Shuriken rifle | 24\" | 1 | 3+ | 4 | -1 | 1 | Assault, Rapid Fire 1 |\n| Wraithcannon | 18\" | 1 | 3+ | 14 | -4 | D6+1 | - |\n\n### Melee Weapons\n| Weapon | Range | A | WS | S | AP | D | Keywords |\n| :--- | :---: | :---: | :---: | :---: | :---: | :---: | :--- |\n| Close combat weapon | Melee | 3 | 3+ | 3 | 0 | 1 | - |\n| Paired Hekatarii blades | Melee | 4 | 2+ | 3 | -2 | 1 | Twin-linked |\n| Power sword | Melee | 3 | 3+ | 4 | -2 | 1 | - |\n| Witch staff | Melee | 2 | 2+ | 3 | 0 | D3 | Anti-Infantry 2+, Psychic |\n\n### Abilities\n*   **Core:** Scouts 7\"\n*   **Faction:** Battle Focus\n*   **Piratical Raiders:** At the start of the battle, select one unit from your opponent's army. Weapons equipped by models in this unit have the [LETHAL HITS] and [PRECISION] abilities while targeting that unit.\n\n### Wargear Abilities\n*   **Channeller Stones:** Once per turn, the first time a saving throw is failed for the bearer's unit, change the Damage characteristic of that attack to 0.\n*   **Faolch\u00fa:** Ranged weapons equipped by models in the bearer's unit have the [IGNORES COVER] ability.\n*   **Mistshield:** The bearer has a 4+ invulnerable save.\n\n### Unit Composition\n*   1 Voidscarred Felarch\n*   4-9 Corsair Voidscarred\n*   *Optional Specialists:* Shade Runner, Soul Weaver, Way Seeker.\n\n**Keywords:** Infantry, Aeldari, Grenades, Anhrathe, Corsair Voidscarred, Psyker (Way Seeker only).\n**Faction Keywords:** Asuryani"}, {"filename": "crusade_rules.md", "content": "# Aeldari Crusade Rules\n\n## Guiding Fate\n**Dire Premonitions:** Prevent Threat from reaching 13. Generate 3 Threads of Fate (Destined Device, Rising Nemesis, etc.).\n\n**Growing Threats:** Add D3 Threat at end of battle (3 if lost).\n\n**Changing the Future:** Use Fulcrum of Fate Agenda to end Threads.\n\n**Thread Stages:** Dawning (Reduce Threat by 3), Waning (2), Frayed (1).\n\n## Destined Device Thread\n*   **Buried Provenance:** Control specific objective to find device.\n*   **Unknowing Bearer:** Destroy specific enemy unit carrying device.\n"}, {"filename": "datasheets.md", "content": "# Aeldari Datasheets\n\nThis index provides links to all unique and common datasheets available to the Aeldari in 10th Edition, including Asuryani, Harlequins, Ynnari, and Corsairs.\n\n## Epic Heroes (Phoenix Lords & Legends)\n*   [Asurmen](asurmen.md)\n*   [Avatar of Khaine](avatar_of_khaine.md)\n*   [Baharroth](baharroth.md)\n*   [Eldrad Ulthran](eldrad_ulthran.md)\n*   [Fuegan](fuegan.md)\n*   [Illic Nightspear](illic_nightspear.md)\n*   [Irillyth](irillyth.md)\n*   [Jain Zar](jain_zar.md)\n*   [Karandras](karandras.md)\n*   [Lhykhis](lhykhis.md)\n*   [Maugan Ra](maugan_ra.md)\n*   [Phoenix](phoenix.md)\n*   [Prince Yriel](prince_yriel.md)\n*   [The Visarch](the_visarch.md)\n*   [The Yncarne](the_yncarne.md)\n*   [Yvraine](yvraine.md)\n\n## Characters\n*   [Amallyn Shadowguide](amallyn_shadowguide.md)\n*   [Autarch](autarch.md)\n*   [Autarch Skyrunner](autarch_skyrunner.md)\n*   [Autarch Wayleaper](autarch_wayleaper.md)\n*   [Bonesinger](bonesinger.md)\n*   [Death Jester](death_jester.md)\n*   [Farseer](farseer.md)\n*   [Farseer Skyrunner](farseer_skyrunner.md)\n*   [Shadowseer](shadowseer.md)\n*   [Solitaire](solitaire.md)\n*   [Spiritseer](spiritseer.md)\n*   [Troupe Master](troupe_master.md)\n*   [Warlock](warlock.md)\n*   [Warlock Skyrunners](warlock_skyrunners.md)\n\n## Battleline\n*   [Guardian Defenders](guardian_defenders.md)\n*   [Storm Guardians](storm_guardians.md)\n*   [Troupe](troupe.md)\n\n## Aspect Warriors\n*   [Dark Reapers](dark_reapers.md)\n*   [Dire Avengers](dire_avengers.md)\n*   [Fire Dragons](fire_dragons.md)\n*   [Howling Banshees](howling_banshees.md)\n*   [Shining Spears](shining_spears.md)\n*   [Striking Scorpions](striking_scorpions.md)\n*   [Swooping Hawks](swooping_hawks.md)\n*   [Warp Spiders](warp_spiders.md)\n\n## Infantry & Wraiths\n*   [Rangers](rangers.md)\n*   [Warlock Conclave](warlock_conclave.md)\n*   [Wraithblades](wraithblades.md)\n*   [Wraithguard](wraithguard.md)\n*   [Wraithlord](wraithlord.md)\n*   [Wraithseer](wraithseer.md)\n\n## Mounted & Beasts\n*   [Shroud Runners](shroud_runners.md)\n*   [Skyweavers](skyweavers.md)\n*   [Windriders](windriders.md)\n\n## Vehicles\n*   [Falcon](falcon.md)\n*   [Fire Prism](fire_prism.md)\n*   [Hornet](hornet.md)\n*   [Night Spinner](night_spinner.md)\n*   [Starweaver](starweaver.md)\n*   [Support Weapons](support_weapons.md)\n*   [Voidweaver](voidweaver.md)\n*   [Vypers](vypers.md)\n*   [War Walkers](war_walkers.md)\n*   [Wave Serpent](wave_serpent.md)\n\n## Super-Heavies & Flyers\n*   [Cobra](cobra.md)\n*   [Crimson Hunter](crimson_hunter.md)\n*   [Hemlock Wraithfighter](hemlock_wraithfighter.md)\n*   [Lynx](lynx.md)\n*   [Nightwing](nightwing.md)\n*   [Phantom Titan](phantom_titan.md)\n*   [Revenant Titan](revenant_titan.md)\n*   [Scorpion](scorpion.md)\n*   [Skathach Wraithknight](skathach_wraithknight.md)\n*   [Vampire Hunter](vampire_hunter.md)\n*   [Vampire Raider](vampire_raider.md)\n*   [Warp Hunter](warp_hunter.md)\n*   [Wraithknight](wraithknight.md)\n\n## Corsairs & Special\n*   [Corsair Cloud Dancer Band](corsair_cloud_dancer_band.md)\n*   [Corsair Reaver Band](corsair_reaver_band.md)\n*   [Corsair Skyreaver Band](corsair_skyreaver_band.md)\n*   [Corsair Skyreavers](corsair_skyreavers.md)\n*   [Corsair Voidreavers](corsair_voidreavers.md)\n*   [Corsair Voidscarred](corsair_voidscarred.md)\n*   [Webway Gate](webway_gate.md)\n\n## Ynnari (Drukhari Allies)\n*   [Hellions](hellions.md)\n*   [Ynnari Archon](ynnari_archon.md)\n*   [Ynnari Incubi](ynnari_incubi.md)\n*   [Ynnari Kabalite Warriors](ynnari_kabalite_warriors.md)\n*   [Ynnari Raider](ynnari_raider.md)\n*   [Ynnari Reavers](ynnari_reavers.md)\n*   [Ynnari Succubus](ynnari_succubus.md)\n*   [Ynnari Venom](ynnari_venom.md)\n*   [Ynnari Wyches](ynnari_wyches.md)\n"}, {"filename": "detachment_armoured_warhost.md", "content": "# Detachment: Armoured Warhost\n\n## Detachment Rule: Skilled Crews\n*   **VEHICLE** ranged weapons gain **[ASSAULT]**.\n*   Re-roll Advance rolls for **FLY VEHICLES**.\n\n---\n\n## Stratagems\n| Stratagem | Cost | Type | Effect |\n| :--- | :--- | :--- | :--- |\n| **Layered Wards** | 1CP | Strategic Ploy | VEHICLE gains FNP 5+ against mortal wounds. |\n| **Swift Deployment** | 1CP | Strategic Ploy | Disembark after Advancing. |\n| **Vectored Engines** | 1CP | Strategic Ploy | FLY VEHICLE eligible to shoot after Falling Back. |\n| **Cloudstrike** | 1CP | Strategic Ploy | VEHICLE gains Deep Strike (can set up >6\" away). |\n| **Soulsight** | 1CP | Strategic Ploy | Re-roll one Hit, Wound, and Damage roll for VEHICLE. |\n| **Anti-Grav Repulsion** | 1CP | Strategic Ploy | -2 to Charge rolls against FLY VEHICLE. |\n\n---\n\n## Enhancements\n*   **Guiding Presence (25 pts):** *PSYKER only.* +1 to Hit for VEHICLE within 9\".\n*   **Harmonisation Matrix (30 pts):** *AELDARI only.* On a 3+, gain 1CP if on an objective.\n*   **Spirit Stone of Raelyth (20 pts):** *PSYKER only.* Lone Operative near VEHICLE; heal VEHICLE D3 wounds.\n*   **Guileful Strategist (15 pts):** *AELDARI only.* Redeploy three VEHICLE units.\n"}, {"filename": "detachment_aspect_host.md", "content": "# Detachment: Aspect Host\n\n## Detachment Rule: Path of the Warrior\n*   Select one for unit when shooting/fighting: **Re-roll Hit rolls of 1** OR **Re-roll Wound rolls of 1**.\n\n---\n\n## Stratagems\n| Stratagem | Cost | Type | Effect |\n| :--- | :--- | :--- | :--- |\n| **Warrior Focus** | 1CP | Battle Tactic | Ignore all modifiers to attacks. |\n| **To Their Final Breath** | 1CP | Strategic Ploy | Fight on death on 4+ (bonus if Aspect Shrine token removed). |\n| **Skyborne Sanctuary** | 1CP | Strategic Ploy | Embark in transport at end of Fight phase. |\n| **Doom Inescapable** | 1CP | Battle Tactic | **AVATAR OF KHAINE:** Wailing Doom becomes 18\" Range, Damage 8. |\n| **Preternatural Precision** | 1CP | Battle Tactic | Gain **[Ignores Cover], [Lethal Hits]**, or **[Sustained Hits 1]**. |\n| **Khaine\u2019s Vengeance** | 1CP | Strategic Ploy | Force Desperate Escape tests on units Falling Back. |\n\n---\n\n## Enhancements\n*   **Aspect of Murder (25 pts):** *AUTARCH only.* +1 Damage and **[Precision]** in melee.\n*   **Mantle of Wisdom (30 pts):** *AUTARCH only.* Leading unit gains both Path of the Warrior abilities.\n*   **Shimmerstone (15 pts):** *AUTARCH only.* -1 to Wound roll against leading unit.\n*   **Strategic Savant (15 pts):** *AUTARCH only.* +1 OC to models in leading unit.\n"}, {"filename": "detachment_corsair_coterie.md", "content": "# Detachment: Corsair Coterie\n\n## Detachment Rule: Relentless Raiders\n*   Enemies ending move on your objective take D3 mortal wounds on a 2+.\n*   **ANHRATHE** gain **Void Thieves** (Objective markers remain under control).\n\n---\n\n## Stratagems\n| Stratagem | Cost | Type | Effect |\n| :--- | :--- | :--- | :--- |\n| **Pirates\u2019 Due** | 1CP | Battle Tactic | Re-roll Wound rolls of 1 (full re-roll for ANHRATHE on objective). |\n| **Lethal Ruse** | 1CP | Strategic Ploy | Charge after Falling Back; ANHRATHE cause mortal wounds. |\n| **Outcast Ambush** | 1CP | Strategic Ploy | RANGERS/SHROUD RUNNERS gain **[Ignores Cover], [Rapid Fire 1]**, +1 AP. |\n| **Into the Breach** | 1CP | Strategic Ploy | ANHRATHE make D6+1\" move after destroying a unit. |\n| **Cloak and Shadow** | 1CP | Strategic Ploy | INFANTRY on objective gain Stealth and 18\" target limit. |\n| **Vengeful Sorrow** | 1CP | Strategic Ploy | Surge move after models are destroyed. |\n\n---\n\n## Enhancements\n*   **Infamy (Aura) (25 pts):** *ANHRATHE only.* -1 OC to enemies within 3\".\n*   **Webway Pathstone (25 pts):** *ANHRATHE only.* Deep Strike; can return to Strategic Reserves.\n*   **Archraider (35 pts):** *ANHRATHE CHARACTER only.* Increase opponent's Stratagem cost by 1CP.\n*   **Voidstone (15 pts):** *ANHRATHE INFANTRY only.* Unit gains 5+ invulnerable save.\n"}, {"filename": "detachment_devoted_of_ynnead.md", "content": "# Detachment: Devoted of Ynnead\n\n## Detachment Rule: Strength from Death\n*   **Lethal Intent:** 6\" move after a unit is destroyed.\n*   **Lethal Surge:** Enhanced Fade Back move.\n*   **Lethal Reprisal:** Fights First if below Starting Strength.\n*   **ASURYANI** gain the **YNNARI** keyword. Must include **YVRAINE** or **THE YNCARNE** as Warlord.\n\n---\n\n## Stratagems\n| Stratagem | Cost | Type | Effect |\n| :--- | :--- | :--- | :--- |\n| **Pall of Dread** | 1CP | Strategic Ploy | Sticky objective after unit is destroyed. |\n| **Macabre Resilience** | 1CP | Battle Tactic | -1 to Wound roll against target unit. |\n| **Emissaries of Ynnead** | 1CP | Battle Tactic | Re-roll Hit rolls of 1 (full re-roll if below Starting Strength). |\n| **Parting the Veil** | 2CP | Strategic Ploy | Fight on death (guaranteed). |\n| **Soulsight** | 1CP | Battle Tactic | Ranged weapons gain **[Lethal Hits]** and **[Ignores Cover]**. |\n| **Death Answers Death** | 1CP | Strategic Ploy | Shoot back after models are destroyed in Shooting phase. |\n\n---\n\n## Enhancements\n*   **Gaze of Ynnead (15 pts):** *FARSEER only.* Eldritch Storm gains **[Devastating Wounds]**.\n*   **Storm of Whispers (10 pts):** *WARLOCK only.* Target hit by attacks must take Battle-shock test.\n*   **Borrowed Vigour (10 pts):** *ARCHON only.* +2 Attacks to melee weapons.\n*   **Morbid Might (15 pts):** *SUCCUBUS only.* Re-roll Wound rolls in melee.\n"}, {"filename": "detachment_eldritch_raiders.md", "content": "# Detachment: Eldritch Raiders\n\n## Detachment Rule: Yriel\u2019s Own\n*   **AELDARI** units can charge after Advancing.\n*   **ANHRATHE, RANGERS, SHROUD RUNNERS** re-roll Advance rolls.\n\n---\n\n## Stratagems\n| Stratagem | Cost | Type | Effect |\n| :--- | :--- | :--- | :--- |\n| **Raiders\u2019 Spoils** | 1CP | Strategic Ploy | +1 OC to ANHRATHE unit in Engagement Range. |\n| **Ruthless Killers** | 1CP | Strategic Ploy | +1 Damage to CORSAIR VOIDSCARRED attacks. |\n| **Yriel\u2019s Example** | 1CP | Epic Deed | INFANTRY unit gains FNP 5+. |\n| **No Prey Too Big** | 1CP | Battle Tactic | +1 to Wound if Strength < Toughness. |\n| **Impeding Fire** | 1CP | Wargear | -2 to Charge rolls for enemy within 36\". |\n| **Withdraw and Reinforce** | 1CP | Strategic Ploy | Remove unit to Strategic Reserves and return destroyed models. |\n\n---\n\n## Enhancements\n*   **Pirate Prince (15 pts):** *PRINCE YRIEL only.* 3+ to regain Battle Focus token.\n*   **Alacritous Assault (20 pts):** *ANHRATHE only.* Melee weapons gain **[LANCE]**.\n*   **Exotic Munitions (15 pts):** *ANHRATHE only.* Ranged weapons gain **[Anti-Monster 5+]** and **[Anti-Vehicle 5+]**.\n*   **Adrenal Infusions (20 pts):** *ANHRATHE INFANTRY only.* Free Fade Back manoeuvre.\n"}, {"filename": "detachment_ghosts_of_the_webway.md", "content": "# Detachment: Ghosts of the Webway\n\n## Detachment Rule: Acrobatic Onslaught\n*   **HARLEQUINS** can move through enemy models on a Charge.\n*   **TROUPE** units gain **BATTLELINE** and OC 2.\n*   Limit 3 of: DEATH JESTER, SHADOWSEER, TROUPE MASTER.\n\n---\n\n## Stratagems\n| Stratagem | Cost | Type | Effect |\n| :--- | :--- | :--- | :--- |\n| **Staged Death** | 1CP | Strategic Ploy | Set destroyed CHARACTER back up with half wounds at end of phase. |\n| **Heroes\u2019 Fall** | 1CP | Strategic Ploy | Fight on death for HARLEQUINS on a 4+. |\n| **Mocking Flight** | 1CP | Strategic Ploy | Eligible to shoot and charge after Falling Back. |\n| **Tricksters\u2019 Retort** | 1CP | Strategic Ploy | 6\" Normal move when enemy ends move within 9\". |\n| **Bloody Dance** | 1CP | Strategic Ploy | Declare a charge in the opponent's Charge phase. |\n| **Exit the Stage** | 1CP | Strategic Ploy | Remove unit to Strategic Reserves at end of opponent's Fight phase. |\n\n---\n\n## Enhancements\n*   **Cegorach\u2019s Coil (25 pts):** *TROUPE MASTER only.* Mortal wounds on the charge (4+ per model).\n*   **Mask of Secrets (15 pts):** *HARLEQUINS only.* Forced Desperate Escape tests for enemies Falling Back.\n*   **Murder\u2019s Jest (20 pts):** *DEATH JESTER only.* Critical Hits on successful hits against Below Half-strength units.\n*   **Mistweave (15 pts):** *SHADOWSEER only.* Leading unit gains **Infiltrators**.\n"}, {"filename": "detachment_guardian_battlehost.md", "content": "# Detachment: Guardian Battlehost\n\n## Detachment Rule: Defend at All Costs\n*   **DIRE AVENGER, GUARDIAN, SUPPORT WEAPON**, or **WAR WALKER** units get +1 to Hit if they or the target are within range of an objective marker.\n\n---\n\n## Stratagems\n| Stratagem | Cost | Type | Effect |\n| :--- | :--- | :--- | :--- |\n| **Warding Salvoes** | 1CP | Battle Tactic | Re-roll Wound rolls against targets on objectives. |\n| **Shield Nodes** | 1CP | Battle Tactic | -1 to Wound roll against unit if within range of an objective. |\n| **Vaul\u2019s Vengeance** | 1CP | Battle Tactic | WAR WALKER unit can shoot back after a Guardian/Avenger unit is destroyed. |\n| **Time to Strike** | 1CP | Strategic Ploy | STORM GUARDIANS auto-advance 6\" and can shoot/charge. |\n| **Blades of Asuryan** | 1CP | Battle Tactic | Ranged weapons gain **[Pistol]**. |\n| **Cost of Victory** | 1CP | Strategic Ploy | Remove unit to Strategic Reserves and return all destroyed models. |\n\n---\n\n## Enhancements\n*   **Craftworld\u2019s Champion (25 pts):** *ASURYANI only.* Bearer has OC 5.\n*   **Ethereal Pathway (30 pts):** *ASURYANI only.* Up to two **GUARDIAN** units gain **Infiltrators**.\n*   **Protector of the Paths (20 pts):** *ASURYANI only.* Leading unit can use Overwatch for 0CP; hits on 5+ (4+ on objective).\n*   **Breath of Vaul (10 pts):** *ASURYANI only.* Leading **STORM GUARDIANS** re-roll flamer attack counts and fusion damage.\n"}, {"filename": "detachment_seer_council.md", "content": "# Detachment: Seer Council\n\n## Detachment Rule: Strands of Fate\n*   Generate 3/6/9 Fate dice at start of battle.\n*   Discard specific Fate dice values to reduce Stratagem costs by 1CP.\n\n---\n\n## Stratagems\n| Stratagem | Cost | Type | Effect |\n| :--- | :--- | :--- | :--- |\n| **Presentiment of Dread** | 1CP | Strategic Ploy | Force Battle-shock test at -1 within 18\". |\n| **Forewarned** | 1CP | Strategic Ploy | -1 to Hit and Wound against unit within 9\" of PSYKER. |\n| **Unshrouded Truth** | 1CP | Strategic Ploy | Reposition unit within 9\" of PSYKER anywhere >9\" from enemy. |\n| **Fate Inescapable** | 1CP | Battle Tactic | **[Ignores Cover]** and improved AP on Critical Wounds. |\n| **Isha\u2019s Fury** | 1CP | Epic Deed | Mortal wounds to enemy ending move within 9\" of PSYKER. |\n| **Psychic Shield** | 1CP | Strategic Ploy | Unit can only be targeted within 18\". |\n\n---\n\n## Enhancements\n*   **Lucid Eye (30 pts):** *ASURYANI PSYKER only.* +/- 1 to a Fate dice value in Command phase.\n*   **Runes of Warding (25 pts):** *ASURYANI PSYKER only.* Unit gains FNP 4+ against Mortal/Psychic/Devastating.\n*   **Stone of Eldritch Fury (15 pts):** *ASURYANI PSYKER only.* +12\" Range to ranged Psychic weapons.\n*   **Torc of Morai-Heg (20 pts):** *ASURYANI PSYKER only.* Increase opponent's Stratagem cost by 1CP.\n"}, {"filename": "detachment_serpent_s_brood.md", "content": "# Detachment: Serpent\u2019s Brood\n\n## Detachment Rule: Boons of the Brood\n*   **HARLEQUIN MOUNTED/VEHICLES** gain **[Sustained Hits 1]**.\n*   Units gain **[Sustained Hits 1]** after disembarking.\n*   **TROUPE** units gain **BATTLELINE** and OC 2.\n\n---\n\n## Stratagems\n| Stratagem | Cost | Type | Effect |\n| :--- | :--- | :--- | :--- |\n| **Fangs of the Brood** | 1CP | Strategic Ploy | TROUPE gains three Dance of Death abilities. |\n| **Venomous Wrath** | 1CP | Strategic Ploy | VEHICLE makes 6\" Normal move after shooting. |\n| **Striking Stride** | 1CP | Strategic Ploy | Eligible to charge after Advancing. |\n| **Weavers\u2019 Coils** | 1CP | Strategic Ploy | MOUNTED unit makes Normal move or 6\" Fall Back at end of Fight phase. |\n| **Weaving Stride** | 1CP | Strategic Ploy | 6\" Normal move when enemy ends move within 9\". |\n| **Skyward Lunge** | 1CP | Strategic Ploy | Remove VEHICLE/MOUNTED to Strategic Reserves. |\n\n---\n\n## Enhancements\n*   **Key of Ghosts (20 pts):** *HARLEQUINS only.* Unit gains **Scouts 6\"**.\n*   **Weavers\u2019 Wail (20 pts):** *TROUPE MASTER only.* +3 Strength and +1 Attacks in melee.\n*   **Fanged Leer (10 pts):** *DEATH JESTER only.* Select two abilities for shrieker cannon.\n*   **Shedskin Raiment (25 pts):** *SHADOWSEER only.* Redeploy three HARLEQUINS units.\n"}, {"filename": "detachment_spirit_conclave.md", "content": "# Detachment: Spirit Conclave\n\n## Detachment Rule: Shepherds of the Dead\n*   When a **PSYKER** is destroyed, the killer gets a Vengeful Dead token. **WRAITH CONSTRUCTS** get +1 to Hit/Wound against units with tokens.\n*   **Spirit Guides (Aura):** **WRAITH** units within 12\" of a **PSYKER** gain Battle Focus.\n*   **WRAITHBLADES** and **WRAITHGUARD** gain **BATTLELINE**.\n\n---\n\n## Stratagems\n| Stratagem | Cost | Type | Effect |\n| :--- | :--- | :--- | :--- |\n| **Seer\u2019s Eye** | 1CP | Battle Tactic | Wraith unit ignores modifiers to AP and Damage against a specific target. |\n| **Wraithbone Armour** | 1CP | Battle Tactic | -1 Damage to attacks against Wraith unit (excluding Titanic). |\n| **Blades from Beyond** | 1CP | Battle Tactic | Melee weapons gain **[Devastating Wounds]**. |\n| **Soul Bridge** | 1CP | Strategic Ploy | Wraith unit is considered within 12\" of a PSYKER for abilities. |\n| **Spirit Token** | 1CP | Strategic Ploy | Objective markers controlled by Wraith units remain under your control even if you leave them. |\n| **Crushing Strides** | 1CP | Battle Tactic | Mortal wounds on the charge (D6 per model based on keywords). |\n\n---\n\n## Enhancements\n*   **Light of Clarity (30 pts):** *SPIRITSEER only.* +1 OC to Wraith INFANTRY, +3 OC to Wraith MONSTERS within 12\".\n*   **Stave of Kurnous (15 pts):** *SPIRITSEER only.* Wraith unit within 12\" gains **[Precision]** on Critical Wounds.\n*   **Rune of Mists (10 pts):** *SPIRITSEER only.* Wraith unit within 12\" gains Benefit of Cover if attacker is >18\" away.\n*   **Higher Duty (25 pts):** *SPIRITSEER only.* Unit can make 6\" Normal move if enemy ends move within 9\".\n"}, {"filename": "detachment_warhost.md", "content": "# Detachment: Warhost\n\n## Detachment Rule: Martial Grace\n*   Receive **1 additional Battle Focus token** at the start of the battle round.\n*   **Swift as the Wind Agile Manoeuvre:** Add an additional 1\" to Move characteristic (total +3\").\n*   **Agile Manoeuvres:** Each time a unit performs an Agile Manoeuvre that involves rolling a D6, add 1 to the result.\n\n---\n\n## Stratagems\n| Stratagem | Cost | Type | When / Effect |\n| :--- | :--- | :--- | :--- |\n| **Lightning-Fast Reactions** | 1CP | Battle Tactic | **Opponent's Shooting/Fight phase.** Subtract 1 from Hit rolls against one ASURYANI unit (excluding Wraith Constructs). |\n| **Skyborne Sanctuary** | 1CP | Strategic Ploy | **End of Fight phase.** An ASURYANI unit within 6\" of a TRANSPORT can embark within it if not in Engagement Range. |\n| **Feigned Retreat** | 1CP | Strategic Ploy | **Movement phase.** An ASURYANI unit that Fell Back is eligible to shoot and charge this turn. |\n| **Blitzing Firepower** | 1CP | Battle Tactic | **Shooting phase.** ASURYANI unit gains [SUSTAINED HITS 1] against targets within 12\". |\n| **Fire and Fade** | 1CP | Strategic Ploy | **Shooting phase.** After an ASURYANI INFANTRY unit (non-Wraith/Aircraft) shoots, it can make a Normal move of D6+1\". |\n| **Webway Tunnel** | 1CP | Strategic Ploy | **End of opponent's Fight phase.** An ASURYANI INFANTRY unit within 9\" of a board edge is placed into Strategic Reserves. |\n\n---\n\n## Enhancements\n*   **Phoenix Gem (35 pts):** *ASURYANI model only.* The first time the bearer is destroyed, on a 2+, set them back up with full wounds.\n*   **Timeless Strategist (15 pts):** *ASURYANI model only.* If the bearer is on the battlefield, receive 1 additional Battle Focus token at the start of the battle round.\n*   **Gift of Foresight (15 pts):** *ASURYANI model only.* Once per battle round, target the bearer's unit with the *Command Re-roll* Stratagem for 0CP.\n*   **Psychic Destroyer (30 pts):** *ASURYANI PSYKER model only.* Add 1 to the Damage characteristic of the bearer's ranged Psychic weapons.\n"}, {"filename": "detachment_windrider_host.md", "content": "# Detachment: Windrider Host\n\n## Detachment Rule: Ride the Wind\n*   **ASURYANI MOUNTED/VYPER** units can be set up from Reserves as if the battle round were one higher.\n*   At the end of your opponent's turn, place 1-3 **MOUNTED/VYPER** units into Strategic Reserves.\n*   **WINDRIDERS** gain the **BATTLELINE** keyword.\n\n---\n\n## Stratagems\n| Stratagem | Cost | Type | Effect |\n| :--- | :--- | :--- | :--- |\n| **Death From On High** | 1CP | Battle Tactic | Re-roll Wound rolls for unit arriving from Reserves this turn. |\n| **Overflight** | 1CP | Strategic Ploy | Unit can make a 7\" Normal move after destroying an enemy unit. |\n| **Wind of Blades** | 1CP | Strategic Ploy | Unit is eligible to shoot and charge after Advancing or Falling Back. |\n| **Daring Riders** | 1CP | Strategic Ploy | Set up from Reserves more than 6\" away (cannot charge if within 9\"). |\n| **Focused Firepower** | 1CP | Battle Tactic | Improve AP characteristic of attacks by 1. |\n| **Spiralling Evasion** | 1CP | Battle Tactic | Unit gains a 4+ invulnerable save. |\n\n---\n\n## Enhancements\n*   **Firstdrawn Blade (10 pts):** *ASURYANI MOUNTED only.* Unit gains **Scouts 9\"**.\n*   **Mirage Field (25 pts):** *ASURYANI MOUNTED only.* -1 to Hit rolls against unit.\n*   **Seersight Strike (15 pts):** *ASURYANI MOUNTED PSYKER only.* Psychic weapons gain **[Anti-Monster 2+]** and **[Anti-Vehicle 2+]**.\n*   **Echoes of Ulthanesh (20 pts):** *ASURYANI MOUNTED only.* On a 5+ (with bonuses for location), gain 1CP.\n"}, {"filename": "detachments.md", "content": "# Aeldari Detachments\n\nEach detachment provides unique rules, enhancements, and stratagems to tailor your army's playstyle.\n\n- [Warhost](detachment_warhost.md)\n- [Windrider Host](detachment_windrider_host.md)\n- [Spirit Conclave](detachment_spirit_conclave.md)\n- [Guardian Battlehost](detachment_guardian_battlehost.md)\n- [Ghosts of the Webway](detachment_ghosts_of_the_webway.md)\n- [Devoted of Ynnead](detachment_devoted_of_ynnead.md)\n- [Seer Council](detachment_seer_council.md)\n- [Aspect Host](detachment_aspect_host.md)\n- [Armoured Warhost](detachment_armoured_warhost.md)\n- [Serpent's Brood](detachment_serpent_s_brood.md)\n- [Eldritch Raiders](detachment_eldritch_raiders.md)\n- [Corsair Coterie](detachment_corsair_coterie.md)\n"}, {"filename": "faq.md", "content": "# Aeldari FAQ\n\n*   **Q: After using the Torc of Morai-Heg Enhancement, must my opponent continue to use the selected Stratagem at the increased cost if they have necessary CP available?**\n    *   **A:** Yes.\n*   **Q: After using the Torc of Morai-Heg Enhancement, if my opponent does not have the necessary CP available for the selected Stratagem, what happens?**\n    *   **A:** No CP are spent and that Stratagem\u2019s effects are not resolved (but that Stratagem still counts as having been used this phase).\n*   **Q: If an ASPECT WARRIORS unit with unused Aspect Shrine tokens is destroyed, do CHARACTERS that were attached to that unit keep those Aspect Shrine tokens?**\n    *   **A:** No.\n*   **Q: When using the Yncarne\u2019s Ethereal Form ability, can I choose for it to regain fewer lost wounds than the D3 roll generated?**\n    *   **A:** No.\n*   **Q: Do out-of-phase Normal moves follow the \u2018Surge\u2019 moves entry from the Core Rules Update?**\n    *   **A:** No.\n"}, {"filename": "firestorm.md", "content": "### **Firestorm**\n**Keywords:** Vehicle, Fly, Firestorm, Aeldari\n\n| M | T | SV | W | LD | OC |\n| :--- | :--- | :--- | :--- | :--- | :--- |\n| 14\" | 9 | 3+ | 12 | 6+ | 3 |\n\n**Ranged Weapons**\n| Weapon | Range | A | BS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| Firestorm scatter laser | 36\" | 16 | 3+ | 5 | 0 | 1 | Anti-Fly 2+ |\n| Shuriken cannon | 24\" | 3 | 3+ | 6 | -1 | 2 | Sustained Hits 1 |\n| Twin shuriken catapult | 18\" | 2 | 3+ | 4 | -3 | 1 | Assault, Twin-linked |\n\n**Melee Weapons**\n| Weapon | Range | A | WS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| Wraithbone hull | Melee | 3 | 4+ | 6 | 0 | 1 | - |\n\n**Abilities**\n*   **Core:** Deadly Demise D3\n*   **Faction:** Battle Focus\n*   **Skyfire:** When using the Fire Overwatch Stratagem against a unit that can **Fly**, you can select up to 3 other enemy units within 24\" that can **Fly**; this model can also shoot at each of those units with its Firestorm scatter laser (unmodified Hit roll of 6 required).\n*   **Damaged (1-4 Wounds Remaining):** Subtract 1 from Hit rolls.\n\n**Transport**\nCapacity: 6 **Aeldari Infantry** models. Each **Wraith Construct** takes 2 spaces. Cannot transport **Jump Pack** or **Ynnari** models.\n\n**Points:** 105 pts"}, {"filename": "introduction.md", "content": "# Aeldari Introduction\n\nThe Aeldari once ruled the galaxy, before their civilisation collapsed under the weight of their hedonism. Now they are a dying and fractured race, their differing factions all finding ways to survive in a galaxy where their extinction seems inevitable. All members of Aeldari society depend on the power of their seers, the skills of their warriors, and the technological superiority of their sleek weapons and engines of war.\n"}, {"filename": "nightwing.md", "content": "### **Nightwing**\n| M | T | SV | W | LD | OC |\n| :--- | :--- | :--- | :--- | :--- | :--- |\n| 20+\" | 8 | 3+ | 12 | 6+ | 0 |\n\n**INVULNERABLE SAVE:** 5+\n\n**RANGED WEAPONS**\n| Weapon | Range | A | BS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| **Twin bright lance** | 36\" | 1 | 3+ | 12 | -3 | D6+2 | Twin-linked |\n| **Twin shuriken cannon** | 24\" | 3 | 3+ | 6 | -1 | 2 | Sustained Hits 1, Twin-linked |\n\n**MELEE WEAPONS**\n| Weapon | Range | A | WS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| **Wraithbone hull** | Melee | 3 | 4+ | 6 | 0 | 1 | - |\n\n**ABILITIES**\n*   **CORE:** Hover\n*   **FACTION:** Battle Focus\n*   **Interceptor:** Each time this model makes a ranged attack that targets a unit that can FLY, add 1 to the Hit roll.\n*   **Damaged (1-4 Wounds Remaining):** Subtract 1 from Hit rolls.\n\n**UNIT COMPOSITION**\n*   1 Nightwing equipped with: twin bright lance; twin shuriken cannon; wraithbone hull.\n\n**KEYWORDS:** VEHICLE, AIRCRAFT, FLY, AELDARI, NIGHTWING\n**FACTION KEYWORDS:** ASURYANI\n\n**Points:** 145 pts"}, {"filename": "phantom_titan.md", "content": "### **Phantom Titan**\n| M | T | SV | W | LD | OC |\n| :--- | :--- | :--- | :--- | :--- | :--- |\n| 14\" | 14 | 2+ | 55 | 6+ | 20 |\n\n**INVULNERABLE SAVE:** 4+ (Against ranged attacks only)\n\n**RANGED WEAPONS**\n| Weapon | Range | A | BS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| **D-bombard** | 72\" | D6 | 3+ | 20 | -4 | 2D6 | Blast, Devastating Wounds |\n| **Phantom pulsar** | 120\" | 8 | 3+ | 18 | -4 | 6 | - |\n| **Phantom starcannon** | 36\" | 4 | 3+ | 8 | -3 | 2 | - |\n| **Pulse laser** | 48\" | 3 | 3+ | 9 | -2 | D6 | - |\n| **Voidstorm missile launcher** | 48\" | 2D6 | 3+ | 8 | -3 | 2 | - |\n\n**MELEE WEAPONS**\n| Weapon | Range | A | WS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| **Phantom feet** | Melee | 4 | 3+ | 12 | -2 | 4 | - |\n| **Wraith glaive \u2013 strike** | Melee | 6 | 3+ | 18 | -4 | 12 | - |\n| **Wraith glaive \u2013 sweep** | Melee | 12 | 3+ | 8 | -3 | 4 | - |\n\n**ABILITIES**\n*   **CORE:** Deadly Demise D6+6\n*   **FACTION:** Battle Focus\n*   **Titanic Advance:** Each time this model makes a Normal, Advance or Fall Back move, it can move over models (excluding TITANIC models) and terrain features that are 4\" or less in height as if they were not there.\n*   **Towering Wraith Construct:** Each time you target this model with a Stratagem, you must spend three times that Stratagem's stated CP cost to do so.\n*   **Flawless Poise:** This model is eligible to shoot and declare a charge in a turn in which it Fell Back.\n\n**WARGEAR OPTIONS**\n*   The **D-bombard** can be replaced with one of the following: 2 Phantom starcannons and 1 wraith glaive; 1 Phantom starcannon, 1 pulse laser and 1 wraith glaive; 2 pulse lasers and 1 wraith glaive; 1 Phantom pulsar.\n*   The **Phantom pulsar** can be replaced with one of the following: 1 D-bombard; 2 Phantom starcannons and 1 wraith glaive; 1 Phantom starcannon, 1 pulse laser and 1 wraith glaive; 2 pulse lasers and 1 wraith glaive.\n*   The **Phantom starcannon** can be replaced with 1 pulse laser.\n\n**UNIT COMPOSITION**\n*   1 Phantom Titan equipped with: D-bombard; Phantom pulsar; Phantom starcannon; voidstorm missile launcher; Phantom feet.\n\n**KEYWORDS:** MONSTER, TITANIC, TOWERING, WALKER, WRAITH CONSTRUCT, AELDARI, PHANTOM TITAN\n**FACTION KEYWORDS:** ASURYANI\n\n**Points:** 2100 pts"}, {"filename": "phoenix.md", "content": "### **Phoenix**\n| M | T | SV | W | LD | OC |\n| :--- | :--- | :--- | :--- | :--- | :--- |\n| 20+\" | 9 | 3+ | 16 | 6+ | 0 |\n\n**RANGED WEAPONS**\n| Weapon | Range | A | BS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| **Phoenix missile array** | 48\" | D6 | 3+ | 6 | -1 | 2 | Blast |\n| **Phoenix pulse laser** | 48\" | 4 | 3+ | 10 | -2 | D6 | - |\n| **Twin shuriken cannon** | 24\" | 3 | 3+ | 6 | -1 | 2 | Sustained Hits 1, Twin-linked |\n\n**MELEE WEAPONS**\n| Weapon | Range | A | WS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| **Wraithbone hull** | Melee | 3 | 4+ | 6 | 0 | 1 | - |\n\n**ABILITIES**\n*   **CORE:** Deadly Demise D6\n*   **FACTION:** Battle Focus\n*   **Strafing Run:** Each time this model makes a ranged attack that targets a unit that cannot FLY, add 1 to the Hit roll.\n*   **Damaged (1-5 Wounds Remaining):** Subtract 1 from Hit rolls.\n\n**UNIT COMPOSITION**\n*   1 Phoenix equipped with: Phoenix missile array; Phoenix pulse laser; twin shuriken cannon; wraithbone hull.\n\n**KEYWORDS:** VEHICLE, FLY, AIRCRAFT, AELDARI, PHOENIX\n**FACTION KEYWORDS:** ASURYANI\n\n**Points:** 155 pts"}, {"filename": "rangers.md", "content": "# Rangers\n**M:** 7\" | **T:** 3 | **Sv:** 5+ | **W:** 1 | **Ld:** 7+ | **OC:** 1\n**Invulnerable Save:** 5+ (Against ranged attacks only)\n\n### Ranged Weapons\n| Weapon | Range | A | BS | S | AP | D | Abilities |\n| :--- | :---: | :---: | :---: | :---: | :---: | :---: | :--- |\n| Long rifle | 36\" | 1 | 3+ | 4 | -1 | 2 | Heavy, Precision |\n| Shuriken pistol | 12\" | 1 | 2+ | 4 | -1 | 1 | Assault, Pistol |\n\n### Melee Weapons\n| Weapon | Range | A | WS | S | AP | D | Abilities |\n| :--- | :---: | :---: | :---: | :---: | :---: | :---: | :--- |\n| Close combat weapon | Melee | 1 | 3+ | 3 | 0 | 1 | - |\n\n### Abilities\n*   **Core:** Infiltrators, Stealth\n*   **Faction:** Battle Focus\n*   **Path of the Outcast:** Once per turn, when an enemy unit ends a Normal, Advance or Fall Back move within 9\" of this unit, it can make a Normal move of up to D6\".\n\n### Unit Composition\n*   **5-10 Rangers**\n*   Every model is equipped with: long rifle; shuriken pistol; close combat weapon.\n\n**Keywords:** Infantry, Aeldari, Rangers\n**Faction Keywords:** Asuryani"}, {"filename": "revenant_titan.md", "content": "### **Revenant Titan**\n| M | T | SV | W | LD | OC |\n| :--- | :--- | :--- | :--- | :--- | :--- |\n| 16\" | 13 | 2+ | 30 | 6+ | 16 |\n\n**INVULNERABLE SAVE:** 4+ (Against ranged attacks only)\n\n**RANGED WEAPONS**\n| Weapon | Range | A | BS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| **Cloudburst missile launcher** | 36\" | 2D6 | 3+ | 8 | -2 | 2 | Blast |\n| **Revenant pulsar** | 60\" | 6 | 3+ | 14 | -3 | 4 | Assault |\n| **Sonic lance** | 18\" | D6+6 | N/A | 8 | -3 | 2 | Anti-Monster 4+, Anti-Vehicle 4+, Assault, Torrent |\n\n**MELEE WEAPONS**\n| Weapon | Range | A | WS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | : :--- | :--- | :--- | :--- |\n| **Revenant feet** | Melee | 8 | 3+ | 10 | -1 | 3 | - |\n\n**ABILITIES**\n*   **CORE:** Deadly Demise 2D6\n*   **FACTION:** Battle Focus\n*   **Titanic Advance:** Each time this model makes a Normal, Advance or Fall Back move, it can move over models (excluding TITANIC models) and terrain features that are 4\" or less in height as if they were not there.\n*   **Towering Wraith Construct:** Each time you target this model with a Stratagem, you must spend twice that Stratagem's stated CP cost to do so.\n*   **Revenant Jet Pack:** Each time this model Advances, do not make an Advance roll for it. Instead, until the end of the phase, add 8\" to the Move characteristic of this model.\n\n**WARGEAR OPTIONS**\n*   This model's **Revenant pulsar** can be replaced with 1 sonic lance.\n*   This model's **sonic lance** can be replaced with 1 Revenant pulsar.\n\n**UNIT COMPOSITION**\n*   1 Revenant Titan equipped with: cloudburst missile launcher; Revenant pulsar; sonic lance; Revenant feet.\n\n**KEYWORDS:** MONSTER, TITANIC, TOWERING, WALKER, FLY, WRAITH CONSTRUCT, AELDARI, REVENANT TITAN\n**FACTION KEYWORDS:** ASURYANI\n\n**Points:** 1100 pts"}, {"filename": "scorpion.md", "content": "### **SCORPION**\n**M:** 14\" | **T:** 11 | **SV:** 2+ | **W:** 24 | **LD:** 6+ | **OC:** 8\n**Invulnerable Save:** 5+\n\n| Ranged Weapons | Range | A | BS | S | AP | D | Keywords |\n| :--- | :---: | :---: | :---: | :---: | :---: | :---: | :--- |\n| Aeldari missile launcher \u2013 starshot | 48\" | 1 | 3+ | 10 | -2 | D6 | - |\n| Aeldari missile launcher \u2013 sunburst blast | 48\" | D6 | 3+ | 4 | -1 | 1 | Blast |\n| Bright lance | 36\" | 1 | 3+ | 12 | -3 | D6+2 | - |\n| Scatter laser | 36\" | 6 | 3+ | 5 | 0 | 1 | - |\n| Shuriken cannon | 24\" | 3 | 3+ | 6 | -1 | 2 | Sustained Hits 1 |\n| Starcannon | 36\" | 2 | 3+ | 8 | -3 | 2 | - |\n| **Twin Scorpion pulsar** | 60\" | 6 | 3+ | 18 | -3 | 5 | Twin-linked |\n\n| Melee Weapons | Range | A | WS | S | AP | D | Keywords |\n| :--- | :---: | :---: | :---: | :---: | :---: | :---: | :--- |\n| Wraithbone hull | Melee | 6 | 4+ | 6 | 0 | 1 | - |\n\n**Abilities**\n*   **Core:** Deadly Demise D6+2\n*   **Faction:** Battle Focus\n*   **Lanced Obliteration:** Each time an attack made with this model's twin Scorpion pulsar destroys an enemy model that has the Deadly Demise ability, that model's Deadly Demise ability inflicts mortal wounds on a D6 roll of 4+ instead of on a 6.\n\n**Damaged: 1-8 Wounds Remaining**\nWhile this model has 1-8 wounds remaining, subtract 4 from its Objective Control characteristic and each time this model makes an attack, subtract 1 from the Hit roll.\n\n**Wargear Options**\n*   This model's shuriken cannon can be replaced with one of the following: 1 Aeldari missile launcher, 1 bright lance, 1 scatter laser, or 1 starcannon.\n\n**Unit Composition**\n*   1 Scorpion (Equipped with: shuriken cannon, twin Scorpion pulsar, wraithbone hull)\n\n**Keywords:** Vehicle, Titanic, Fly, Aeldari, Scorpion\n**Faction Keywords:** Asuryani"}, {"filename": "shadow_spectres.md", "content": "# Shadow Spectres\n\n**M:** 12\" | **T:** 3 | **Sv:** 3+ | **W:** 1 | **Ld:** 6+ | **OC:** 1\n**Invulnerable Save:** 5+\n\n### Ranged Weapons\n| Weapon | Range | A | BS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| Prism rifle \u2013 dispersed | 18\" | D6 | 3+ | 4 | -1 | 1 | Blast |\n| Prism rifle \u2013 focused | 24\" | 1 | 3+ | 6 | -2 | 3 | - |\n\n### Melee Weapons\n| Weapon | Range | A | WS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| Close combat weapon | Melee | 2 | 3+ | 3 | 0 | 1 | - |\n\n### Abilities\n*   **Core:** Deep Strike, Stealth\n*   **Faction:** Battle Focus\n*   **Shade of Twilight:** In your Shooting phase, after this unit has shot, if it is not within Engagement Range of enemy units, it can make a Normal move of up to D6\". If it does, it is not eligible to declare a charge this turn.\n\n### Unit Composition\n*   0-1 Shadow Spectre Exarch\n*   5-10 Shadow Spectres\n*   Every model is equipped with: prism rifle; close combat weapon.\n\n**Keywords:** Infantry, Jump Pack, Fly, Shadow Spectres, Aeldari\n**Faction Keywords:** Asuryani"}, {"filename": "skathach_wraithknight.md", "content": "### **Skathach Wraithknight**\n| M | T | SV | W | LD | OC |\n| :--- | :--- | :--- | :--- | :--- | :--- |\n| 10\" | 12 | 2+ | 18 | 6+ | 10 |\n\n**RANGED WEAPONS**\n| Weapon | Range | A | BS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| **Deathshroud cannon \u2013 dispersed** | 12\" | 3D6 | 3+ | 6 | -1 | 1 | Blast, Devastating Wounds |\n| **Deathshroud cannon \u2013 focused** | 48\" | D6 | 3+ | 10 | -3 | 2 | Blast, Devastating Wounds |\n| **Inferno lance** | 24\" | 4 | 3+ | 12 | -4 | D6 | Melta 2 |\n| **Scatter laser** | 36\" | 6 | 3+ | 5 | 0 | 1 | - |\n| **Shuriken cannon** | 24\" | 3 | 3+ | 6 | -1 | 2 | Sustained Hits 1 |\n| **Starcannon** | 36\" | 2 | 3+ | 8 | -3 | 2 | - |\n\n**MELEE WEAPONS**\n| Weapon | Range | A | WS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| **Titanic feet** | Melee | 5 | 3+ | 8 | -1 | 2 | - |\n\n**ABILITIES**\n*   **CORE:** Deadly Demise D6, Deep Strike\n*   **FACTION:** Battle Focus\n*   **Agile:** Each time this model makes a Normal, Advance or Fall Back move, it can move over other models (excluding TITANIC models) and terrain features that are 4\" or less in height as if they were not there.\n*   **Webway Shunt Generator:** Once per battle, at the end of your opponent's turn, if this model is not within Engagement Range of one or more enemy units, you can remove this model from the battlefield and place it into Strategic Reserves.\n*   **Scattershield (Wargear):** The bearer has a 4+ invulnerable save.\n\n**WARGEAR OPTIONS**\n*   This model can be equipped with up to two of the following: 1 scatter laser, 1 shuriken cannon, 1 starcannon.\n*   This model's **inferno lance** can be replaced with 1 deathshroud cannon.\n*   This model's **scattershield** can be replaced with: 1 inferno lance or 1 deathshroud cannon.\n\n**UNIT COMPOSITION**\n*   1 Skathach Wraithknight equipped with: inferno lance; titanic feet; scattershield.\n\n**KEYWORDS:** MONSTER, TITANIC, TOWERING, WALKER, WRAITH CONSTRUCT, AELDARI, SKATHACH WRAITHKNIGHT\n**FACTION KEYWORDS:** ASURYANI\n\n**Points:** 490 pts"}, {"filename": "striking_scorpions.md", "content": "### Striking Scorpions\n\n| M | T | SV | W | LD | OC | INV |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| 7\" | 3 | 3+ | 1 | 6+ | 1 | 5+ |\n\n### RANGED WEAPONS\n| Weapon | Range | A | BS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| **Chainsabres** | 12\" | 1 | 3+ | 4 | -1 | 1 | Assault, Pistol, Twin-linked |\n| **Shuriken pistol** | 12\" | 1 | 3+ | 4 | -1 | 1 | Assault, Pistol |\n\n### MELEE WEAPONS\n| Weapon | Range | A | WS | S | AP | D | Keywords |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| **Biting blade** | Melee | 4 | 3+ | 6 | -3 | 1 | Sustained Hits 1 |\n| **Chainsabres** | Melee | 5 | 3+ | 4 | -1 | 1 | Sustained Hits 1, Twin-linked |\n| **Scorpion chainsword** | Melee | 4 | 3+ | 4 | -1 | 1 | Sustained Hits 1 |\n| **Scorpion\u2019s claw** | Melee | 3 | 3+ | 8 | -2 | 2 | \u2014 |\n\n### ABILITIES\n**CORE:** Infiltrators, Scouts 7\", Stealth\n**FACTION:** Battle Focus\n\n**Mandiblasters**\nEach time a model in this unit makes a melee attack, if it made a Charge move this turn, an unmodified Hit roll of 5+ scores a Critical Hit.\n\n### WARGEAR ABILITIES\n**Aspect Shrine Token**\nOnce per battle for each Aspect Shrine token this unit has, you can change the result of one Hit roll or one Wound roll made for a model in this unit (excluding CHARACTER mo     // Configure marked to handle GitHub flavored markdown well
    marked.setOptions({
      gfm: true,
      breaks: true
    });

    // Render Rules
    const rulesContainer = document.getElementById('rules-container');
    rulesData.forEach(rule => {
        // Skip some files we don't want rendered as massive raw HTML blocks if they aren't standard rules
        if (rule.filename.includes('.html')) return;
        
        const div = document.createElement('div');
        div.className = 'rule-card';
        div.innerHTML = marked.parse(rule.content);
        rulesContainer.appendChild(div);
    });

    // Render Datasheets
    const dsContainer = document.getElementById('datasheets-container');
    dsContainer.innerHTML = unitsData.map(unit => `
        <div class="datasheet" style="margin-bottom: 40px;">
            <div class="header"><h1>${unit.name}</h1></div>
            <div class="stats-container">
                ${Object.entries(unit.stats).map(([l, v]) => `
                    <div class="stat-box"><div class="stat-label">${l}</div><div class="stat-val">${v}</div></div>
                `).join('')}
            </div>
            ${unit.invuln !== '-' ? `<div class="invuln-badge"><span class="invuln-val">${unit.invuln}</span> INVULNERABLE SAVE</div>` : '<div style="height: 15px;"></div>'}
            
            <div class="main-grid">
                <div class="left-col">
                    ${unit.ranged.length > 0 ? `
                    <div class="section-header"><span>Ranged Weapons</span><div class="weapon-labels"><span>RNG</span><span>A</span><span>BS</span><span>S</span><span>AP</span><span>D</span></div></div>
                    ${unit.ranged.map(w => renderWeapon(w)).join('')}
                    ` : ''}
                    
                    ${unit.melee.length > 0 ? `
                    <div class="section-header"><span>Melee Weapons</span><div class="weapon-labels"><span>RNG</span><span>A</span><span>WS</span><span>S</span><span>AP</span><span>D</span></div></div>
                    ${unit.melee.map(w => renderWeapon(w)).join('')}
                    ` : ''}
                </div>
                <div class="right-col">
                    <div class="section-header">Abilities</div>
                    <div class="ability-content">
                        ${unit.abilities.map(a => `<div class="ability-item"><span class="ability-header">${a.h}</span> ${a.t}</div>`).join('')}
                    </div>
                    <div class="section-header">Unit Composition</div>
                    <div class="composition-box">
                        ${unit.composition.map(c => `<p style="margin:0 0 5px 0">■ ${c}</p>`).join('')}
                        <div class="points-badge">${unit.points}</div>
                    </div>
                </div>
            </div>
            <div class="footer">
                <div><b>Keywords:</b> ${unit.keywords}</div>
                <div class="footer-divider"><b>Faction:</b> ${unit.faction}</div>
            </div>
        </div>
    `).join('');

    function renderWeapon(w) {
        const tagsHtml = w.tags && w.tags.length > 0 ? w.tags.map(t => `<span class="tag">${t}</span>`).join('') : '';
        return `
            <div class="weapon-row">
                <div class="weapon-info"><b>${w.name}</b>${tagsHtml ? `<div style="margin-top:3px">${tagsHtml}</div>` : ''}</div>
                <div class="weapon-stats"><span>${w.rng}</span><span>${w.a}</span><span>${w.skill}</span><span>${w.s}</span><span>${w.ap}</span><span>${w.d}</span></div>
            </div>
        `;
    }
</script>
